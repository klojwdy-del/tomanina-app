name: Build Android Application
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Project Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor Configuration
      run: |
        npx cap init tomanina-app com.tomanina.app --web-dir=dist --noprompts

    - name: Build Web Production Assets
      run: npm run build

    - name: Add Android Platform
      run: npx cap add android

    - name: Sync Capacitor Projects
      run: npx cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Build Android Release APK
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tomanina-release-apk
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
